apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-frontend
  labels:
    app: todo-frontend

spec:
  replicas: 2

  selector:
    matchLabels:
      app: todo-frontend

  template:
    metadata:
      labels:
        app: todo-frontend

    spec:
      containers:
        - name: todo-frontend
          image: vinitparmar03/todo_frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
