apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-mongodb
  labels:
    app: todo-mongodb

spec:
  selector:
    matchLabels:
      app: todo-mongodb
  replicas: 1
  template:
    metadata:
      labels:
        app: todo-mongodb
    spec:
      containers:
        - name: todo-mongodb
          image: mongo:7
          ports:
            - containerPort: 27017
          
          volumeMounts:
            - name: mongodb-storage
              mountPath: /data/db
              
      volumes:
      - name: mongodb-storage
        persistentVolumeClaim:
          claimName: mongodb-pvc
