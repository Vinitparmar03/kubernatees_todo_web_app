grafana:
  enabled: true

  adminUser: admin
  adminPassword: admin
  
  ingress:
    enabled: true
    ingressClassName: nginx


    hosts:
      - grafana.local

    path: /
    pathType: Prefix

prometheus:
  ingress:
    enabled: true
    ingressClassName: nginx

    hosts:
      - prometheus.local

    paths:
      - /

    pathType: Prefix