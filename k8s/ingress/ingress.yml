apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: todo-ingress
spec:
  rules:
  - host: todo.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: todo-frontend
            port:
              number: 80

      - path: /api
        pathType: Prefix
        backend:
          service:
            name: todo-backend
            port:
              number: 5000
      
      - path: /metrics
        pathType: Prefix
        backend:
          service:
            name: todo-backend
            port:
              number: 5000